# wrangler.toml — Cloudflare Pages Configuration
# Untuk deploy ke Cloudflare Pages menggunakan @cloudflare/next-on-pages
#
# CATATAN PENTING:
# Cloudflare Pages mendukung Next.js via @cloudflare/next-on-pages
# ExcelJS (Node.js only) tidak tersedia di Cloudflare Edge Runtime
# Gunakan Vercel untuk fitur Export Excel

name = "kegiatan-kantor"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".vercel/output/static"

[vars]
NEXT_PUBLIC_APP_NAME = "Sistem Informasi Daftar Kegiatan Kantor"

# Secrets (set via Cloudflare Dashboard atau wrangler secret put):
# DATABASE_URL
# DIRECT_URL
# NEXTAUTH_SECRET
# NEXTAUTH_URL

